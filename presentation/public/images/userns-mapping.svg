<svg xmlns="http://www.w3.org/2000/svg" width="700" height="160" viewBox="0 0 700 160">
  <!-- Host column -->
  <rect x="10" y="0" width="220" height="155" rx="8" fill="none" stroke="#888" stroke-width="2"/>
  <text x="120" y="22" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#888">Host</text>

  <rect x="25" y="35" width="190" height="34" rx="4" fill="#3b82f6"/>
  <text x="120" y="57" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#fff">Your UID (1000)</text>

  <rect x="25" y="80" width="190" height="34" rx="4" fill="#8b5cf6"/>
  <text x="120" y="102" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#fff">Sub-UIDs (auto-allocated)</text>

  <!-- Container column -->
  <rect x="470" y="0" width="220" height="155" rx="8" fill="none" stroke="#888" stroke-width="2"/>
  <text x="580" y="22" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#888">Container</text>

  <rect x="485" y="35" width="190" height="34" rx="4" fill="#3b82f6"/>
  <text x="580" y="57" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#fff">UID 1000 (you)</text>

  <rect x="485" y="80" width="190" height="34" rx="4" fill="#8b5cf6"/>
  <text x="580" y="102" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#fff">UID 0 (root)</text>

  <rect x="485" y="120" width="190" height="28" rx="4" fill="#8b5cf6"/>
  <text x="580" y="139" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#fff">UIDs 1–999</text>

  <!-- Arrows -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <line x1="215" y1="52" x2="485" y2="52" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="350" y="47" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">keep-id</text>

  <line x1="215" y1="97" x2="485" y2="97" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="350" y="92" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">mapped</text>

  <line x1="215" y1="105" x2="485" y2="134" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
</svg>
